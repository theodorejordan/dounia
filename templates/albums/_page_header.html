{% load hi %}
<div class="sticky top-0 z-10 bg-white border-b px-4 h-16 flex items-center justify-between">
  <h1 class="text-2xl font-bold text-gray-800">{{ page_title }}</h1>
  {% if page_show_mode_toggle %}
  <div class="flex gap-2">
    <button id="btn-mode-link" type="button" class="p-2 rounded-md text-sm font-medium transition bg-blue-600 text-white flex items-center gap-1">
      {% hi "link" css_class="h-4 w-4" %}
      Link
    </button>
    <button id="btn-mode-manual" type="button" class="p-2 rounded-md text-sm font-medium transition bg-gray-100 text-gray-700 hover:bg-gray-200 flex items-center gap-1">
      {% hi "pencil-alt" css_class="h-4 w-4" %}
      Manual
    </button>
  </div>
  {% endif %}
</div>
