<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Dounia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm px-4 space-y-4">
    <p class="text-center text-sm text-gray-500">
      <a href="{% url 'collection' %}" class="hover:underline">Back to Home</a>
    </p>

    <div class="bg-white rounded-md border border-gray-200 p-8">
      <h2 class="text-lg font-semibold text-gray-800 mb-6">Create an account</h2>

      <form method="post" novalidate>
        {% csrf_token %}

        {% for field in form %}
          <div class="mb-4">
            <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
              {{ field.label }}
            </label>
            <input type="{{ field.field.widget.input_type }}"
                   name="{{ field.html_name }}"
                   id="{{ field.id_for_label }}"
                   {% if field.value %}value="{{ field.value }}"{% endif %}
                   {% if forloop.first %}autofocus{% endif %}
                   class="w-full px-4 py-2 border {% if field.errors %}border-red-400{% else %}border-gray-300{% endif %} rounded-md outline-none text-sm">
            {% for error in field.errors %}
              <p class="text-red-500 text-xs mt-1">{{ error }}</p>
            {% endfor %}
          </div>
        {% endfor %}

        <button type="submit"
                class="w-full bg-gray-900 text-white py-2.5 rounded-md font-medium hover:bg-gray-700 transition-colors text-sm mt-2">
          Create account
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500">
      <a href="/login/" class="hover:underline">Log in</a>
    </p>
  </div>
</body>
</html>
