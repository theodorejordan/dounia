{% extends 'base.html' %}

{% block title %}Collection — Dounia{% endblock %}

{% block content %}
<!-- Unified filter bar: full-width, sticky -->
<div class="sticky top-0 z-10 bg-white border-b p-4">
  <form method="GET" action="{% url 'collection' %}" id="filter-form">
    <!-- Single unified filter input -->
    <div class="relative mb-1">
      <input id="unified-filter" placeholder="Filter by artist, contributor, or tags..." class="w-full">
      <button type="button" id="clear-filters" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden z-10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>
    <div id="hidden-tags-inputs"></div>
    <input type="hidden" name="category" id="category-input" value="{{ selected_category }}">

    <!-- Category filter buttons -->
    <div class="flex flex-wrap gap-1">
      {% for category_key, category_label in tag_categories %}
      <button
        type="button"
        data-category="{{ category_key }}"
        data-label="{{ category_label }}"
        class="category-btn px-2 py-1 text-xs rounded transition-colors text-blue-800 hover:bg-blue-200"
      >
        {{ category_label }}
      </button>
      {% endfor %}
    </div>

    <!-- Second row for child tags (initially collapsed) -->
    <div id="tags-row">
      <div id="tags-row-buttons" class="flex flex-wrap gap-1"></div>
    </div>
  </form>
</div>

<!-- Album grid -->
<div id="main-content" class="transition-all duration-300">
  <div class="max-w-[82rem] mx-auto p-4">
    <div id="album-grid-wrapper" class="relative">
      <div id="album-grid-container">
        {% include 'albums/_album_grid.html' %}
      </div>
    </div>
  </div>
</div>

<!-- Album Drawer -->
<div id="album-drawer" class="fixed right-0 top-24 w-[380px] h-[calc(100vh-6rem)] bg-white border-l transition-transform duration-300 overflow-y-auto z-5">
  <div id="drawer-content">
  </div>
</div>

<style>
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Subcategory row expand/collapse transition */
  #tags-row {
    display: grid;
    grid-template-rows: 0fr;
    opacity: 0;
    transition: grid-template-rows 0.20s ease-in, opacity 0.20s ease-in; /* collapse */
  }

  #tags-row.expanded {
    grid-template-rows: 1fr;
    opacity: 1;
    transition: grid-template-rows 0.20s ease-out, opacity 0.20s ease-out; /* expand */
  }

  #tags-row-buttons {
    overflow: hidden;
    padding-top: 0.25rem;
  }

  /* Disabled filter form state */
  #filter-form.loading {
    pointer-events: none;
  }

  #filter-form.loading input,
  #filter-form.loading .tagify {
    background-color: #f3f4f6 !important;
    cursor: not-allowed !important;
  }

  #filter-form.loading .tag-filter-btn {
    background-color: #f3f4f6 !important;
    color: #9ca3af !important;
    border-color: #d1d5db !important;
    cursor: not-allowed !important;
  }

  #filter-form.loading .category-btn {
    color: #9ca3af !important;
    border-color: #d1d5db !important;
    --tw-ring-color: #d1d5db !important;
    cursor: not-allowed !important;
  }

  /* Loading state for grid wrapper */
  #album-grid-wrapper.loading #album-grid-container .grid {
    position: relative;
    opacity: 0.5;
  }

  /* Overlay only on the grid, not the count */
  #album-grid-wrapper.loading #album-grid-container .grid::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(195, 195, 195, 0.4);
    z-index: 10;
    border-radius: 6px;
  }

  /* Spinner centered on grid */
  #album-grid-wrapper.loading #album-grid-container .grid::after {
    content: '';
    position: absolute;
    inset: 0;
    margin: auto;
    width: 40px;
    height: 40px;
    border: 3px solid #e5e7eb;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    z-index: 11;
  }

  .tagify {
    display: flex;
    align-items: center;
    min-height: 43.39px;
  }

  .tagify__tag {
    margin: 0.2rem;
    display: inline-flex;
    align-items: center;
  }

  /* Dropdown as inline chips */
  .tagify__dropdown__wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px;
  }

  .tagify__dropdown__item {
    display: inline-block !important;
    width: auto !important;
  }

  /* Drawer positioning */
  #album-drawer {
    transform: translateX(100%);
  }

  /* Drawer open state */
  #album-drawer.open {
    transform: translateX(0);
  }

  /* Grid shrinks when drawer is open */
  #main-content.drawer-open {
    margin-right: 380px;
  }

  /* Remove default focus outline and set base outline for smooth transition */
  .album-card {
    outline: 1px solid transparent;
    outline-offset: -1px;
  }

  .album-card:focus {
    outline: 1px solid transparent;
  }

  /* Active album card highlight */
  .album-card.active {
    outline: 1px solid #3b82f6;
    outline-offset: -1px;
    box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
    transform: scale(1.01);
  }
</style>

<script>
  const IS_STAFF = {{ request.user.is_staff|yesno:"true,false" }};

  // ====== FILTER BAR HEIGHT (for drawer positioning) ======
  function updateFilterBarHeight() {
    const filterBar = document.querySelector('.sticky.top-0');
    const height = filterBar ? filterBar.offsetHeight : 0;
    document.documentElement.style.setProperty('--filter-bar-height', height + 'px');
  }
  updateFilterBarHeight();
  window.addEventListener('resize', updateFilterBarHeight);

  // ====== UNIFIED FILTER SETUP ======
  const input = document.querySelector('#unified-filter');
  const form = document.getElementById('filter-form');
  const hiddenInputsContainer = document.getElementById('hidden-tags-inputs');
  const clearFiltersBtn = document.getElementById('clear-filters');

  // Type styling configuration
  const TYPE_CONFIG = {
    tag: { label: 'Tag', bg: '#DBEAFE', color: '#1E40AF', chipBg: '#DBEAFE' },
    artist: { label: 'Artist', bg: '#D1FAE5', color: '#065F46', chipBg: '#D1FAE5' },
    contributor: { label: 'By', bg: '#FEF3C7', color: '#92400E', chipBg: '#FEF3C7' }
  };

  // Build unified whitelist: type|id|name|extra
  const unifiedWhitelist = [
    // Tags: tag|id|name|category
    {% for tag in all_tags %}
    "tag|{{ tag.id }}|{{ tag.name }}|{{ tag.get_category_display }}",
    {% endfor %}
    // Artists: artist|id|name|album_count
    {% for artist in all_artists %}
    "artist|{{ artist.id }}|{{ artist.name|escapejs }}|{{ artist.album_count }}",
    {% endfor %}
    // Contributors: contributor|id|username|album_count
    {% for user in all_contributors %}
    "contributor|{{ user.id }}|{{ user.username|escapejs }}|{{ user.album_count }}",
    {% endfor %}
  ];

  const tagify = new Tagify(input, {
    enforceWhitelist: true,
    whitelist: unifiedWhitelist,
    dropdown: {
      enabled: 1,
      maxItems: 30,
      closeOnSelect: false,
      highlightFirst: true,
      searchKeys: ['value']
    },
    templates: {
      tag: function(tagData) {
        const parts = tagData.value.split('|');
        const type = parts[0];
        const name = parts[2];
        const config = TYPE_CONFIG[type] || TYPE_CONFIG.tag;
        return `<tag title="${name}" contenteditable='false' spellcheck='false'
                    class='tagify__tag' style='--tag-bg: ${config.chipBg}; --tag-text-color: ${config.color};'>
                    <x title='Remove' class='tagify__tag__removeBtn' role='button'></x>
                    <div>
                        <span style='font-size: 0.80rem;'>${name}</span>
                    </div>
                </tag>`;
      },
      dropdownItem: function(tagData) {
        const parts = (tagData.value || '').split('|');
        const type = parts[0];
        const name = parts[2] || tagData.value;
        const extra = parts[3] || '';
        const config = TYPE_CONFIG[type] || TYPE_CONFIG.tag;

        // Format extra info based on type
        let extraText = '';
        if (type === 'tag') {
          extraText = extra; // category name
        } else {
          extraText = extra + ' album' + (parseInt(extra) !== 1 ? 's' : '');
        }

        return `<div ${this.getAttributes(tagData)} class='tagify__dropdown__item' tabindex="0" role="option"
                    style='padding: 6px 10px; border-radius: 4px; background: ${config.bg}; color: ${config.color};'>
                    <span style='font-size: 0.75rem;'>${name}</span>
                    <span style='opacity: 0.6; font-size: 0.65rem; margin-left: 4px;'>${extraText}</span>
                </div>`;
      }
    },
    transformTag: function(tagData) {
      const parts = tagData.value.split('|');
      tagData.type = parts[0];
      tagData.id = parts[1];
      tagData.name = parts[2];
      tagData.extra = parts[3];
    }
  });

  // Function to update hidden inputs based on selected filters
  function updateHiddenInputs() {
    hiddenInputsContainer.innerHTML = '';
    tagify.value.forEach(item => {
      const parts = item.value.split('|');
      const type = parts[0];
      const id = parts[1];
      const name = parts[2];

      const hiddenInput = document.createElement('input');
      hiddenInput.type = 'hidden';

      if (type === 'tag') {
        hiddenInput.name = 'tags';
        hiddenInput.value = id;
      } else if (type === 'artist') {
        hiddenInput.name = 'artist';
        hiddenInput.value = name;
      } else if (type === 'contributor') {
        hiddenInput.name = 'contributor';
        hiddenInput.value = name;
      }

      hiddenInputsContainer.appendChild(hiddenInput);
    });
  }

  // Update hidden inputs on add/remove
  tagify.on('add', updateHiddenInputs);
  tagify.on('remove', updateHiddenInputs);

  // Flag to prevent form submission during initialization
  let isInitializing = true;

  // Submit form when filter is added or removed (after initialization)
  tagify.on('add', function() {
    if (!isInitializing) {
      triggerFilterUpdate();
    }
  });
  tagify.on('remove', function() {
    if (!isInitializing) {
      triggerFilterUpdate();
    }
  });

  // Initialize with pre-selected filters from URL
  const initialFilters = [];

  // Add selected tags
  const selectedTags = {{ selected_tags|safe }};
  {% for tag in all_tags %}
  if (selectedTags.includes({{ tag.id }})) {
    initialFilters.push("tag|{{ tag.id }}|{{ tag.name }}|{{ tag.get_category_display }}");
  }
  {% endfor %}

  // Add selected artist
  const selectedArtist = "{{ selected_artist|escapejs }}";
  if (selectedArtist) {
    {% for artist in all_artists %}
    if ("{{ artist.name|escapejs }}" === selectedArtist) {
      initialFilters.push("artist|{{ artist.id }}|{{ artist.name|escapejs }}|{{ artist.album_count }}");
    }
    {% endfor %}
  }

  // Add selected contributor
  const selectedContributor = "{{ selected_contributor|escapejs }}";
  if (selectedContributor) {
    {% for user in all_contributors %}
    if ("{{ user.username|escapejs }}" === selectedContributor) {
      initialFilters.push("contributor|{{ user.id }}|{{ user.username|escapejs }}|{{ user.album_count }}");
    }
    {% endfor %}
  }

  if (initialFilters.length > 0) {
    tagify.addTags(initialFilters);
    updateHiddenInputs();
  }

  // Initialization complete
  isInitializing = false;

  // ====== CLICKABLE TAGS IN GRID ======
  document.addEventListener('click', function(e) {
    const tagElement = e.target.closest('.tag-clickable');
    if (!tagElement) return;

    e.preventDefault();
    e.stopPropagation();

    const tagId = tagElement.dataset.tagId;
    const tagName = tagElement.dataset.tagName;
    const tagCategory = tagElement.dataset.tagCategory;

    // Format: "tag|id|name|category"
    const tagValue = `tag|${tagId}|${tagName}|${tagCategory}`;

    // Check if already added
    const isAlreadyAdded = tagify.value.some(item => item.value === tagValue);

    if (!isAlreadyAdded) {
      tagify.addTags([tagValue]);
    }
  });

  // ====== CLICKABLE ARTIST IN GRID ======
  document.addEventListener('click', function(e) {
    const artistElement = e.target.closest('.artist-clickable');
    if (!artistElement) return;

    e.preventDefault();
    e.stopPropagation();

    const artistId = artistElement.dataset.artistId;

    // Find matching entry in whitelist (must match exactly for enforceWhitelist)
    const artistValue = unifiedWhitelist.find(item => item.startsWith(`artist|${artistId}|`));

    if (!artistValue) return; // Artist not in whitelist

    // Check if already added
    const isAlreadyAdded = tagify.value.some(item => item.value === artistValue);

    if (!isAlreadyAdded) {
      // Remove any existing artist filter (only one artist at a time)
      const existingArtist = tagify.value.find(item => item.value.startsWith('artist|'));
      if (existingArtist) {
        tagify.removeTags(existingArtist.value);
      }
      tagify.addTags([artistValue]);
    }
  });

  // ====== CLICKABLE CONTRIBUTOR IN GRID ======
  document.addEventListener('click', function(e) {
    const contributorElement = e.target.closest('.contributor-clickable');
    if (!contributorElement) return;

    e.preventDefault();
    e.stopPropagation();

    const contributorId = contributorElement.dataset.contributorId;

    // Find matching entry in whitelist (must match exactly for enforceWhitelist)
    const contributorValue = unifiedWhitelist.find(item => item.startsWith(`contributor|${contributorId}|`));

    if (!contributorValue) return; // Contributor not in whitelist

    // Check if already added
    const isAlreadyAdded = tagify.value.some(item => item.value === contributorValue);

    if (!isAlreadyAdded) {
      // Remove any existing contributor filter (only one contributor at a time)
      const existingContributor = tagify.value.find(item => item.value.startsWith('contributor|'));
      if (existingContributor) {
        tagify.removeTags(existingContributor.value);
      }
      tagify.addTags([contributorValue]);
    }
  });

  // Clear all filters button
  function updateClearFiltersVisibility() {
    const catInput = document.getElementById('category-input');
    const hasFilters = tagify.value.length > 0 || (catInput && catInput.value);
    if (hasFilters) {
      clearFiltersBtn.classList.remove('hidden');
    } else {
      clearFiltersBtn.classList.add('hidden');
    }
  }

  updateClearFiltersVisibility();
  tagify.on('add', updateClearFiltersVisibility);
  tagify.on('remove', updateClearFiltersVisibility);

  clearFiltersBtn.addEventListener('click', function() {
    tagify.removeAllTags();
    // Also clear category filter
    categoryInput.value = '';
    selectedCategory = null;
    tagsRow.classList.add('hidden');
    categoryBtns.forEach(b => b.classList.remove('ring-1', 'ring-blue-500'));
    triggerFilterUpdate();
  });

  // ====== CATEGORY FILTER WITH EXPANDABLE TAG ROW ======
  const categoryInput = document.getElementById('category-input');
  const categoryBtns = document.querySelectorAll('.category-btn');
  const tagsRow = document.getElementById('tags-row');
  const tagsRowButtons = document.getElementById('tags-row-buttons');
  let selectedCategory = null;

  // Helper: Trigger HTMX request with current filters
  function triggerFilterUpdate() {
    const params = new URLSearchParams();

    // Parse unified filter values by type
    tagify.value.forEach(item => {
      const parts = item.value.split('|');
      const type = parts[0];
      const id = parts[1];
      const name = parts[2];

      if (type === 'tag') {
        params.append('tags', id);
      } else if (type === 'artist') {
        params.set('artist', name);
      } else if (type === 'contributor') {
        params.set('contributor', name);
      }
    });

    // Add category filter
    if (categoryInput.value) {
      params.set('category', categoryInput.value);
    }

    // Update browser URL to match current filters
    const newUrl = params.toString()
      ? `${window.location.pathname}?${params.toString()}`
      : window.location.pathname;
    history.replaceState(null, '', newUrl);

    // Make HTMX request
    const url = `/partials/album-grid/?${params.toString()}`;
    htmx.ajax('GET', url, {target: '#album-grid-container', swap: 'innerHTML'});
  }

  // Preload and organize all tags by category (instant access, no API call needed)
  const tagsByCategory = {};
  {% for tag in all_tags %}
  const category_{{ forloop.counter }} = "{{ tag.category }}";
  if (!tagsByCategory[category_{{ forloop.counter }}]) {
    tagsByCategory[category_{{ forloop.counter }}] = [];
  }
  tagsByCategory[category_{{ forloop.counter }}].push({
    id: {{ tag.id }},
    name: "{{ tag.name }}",
    count: {{ tag.album_count }}
  });
  {% endfor %}

  // CSS classes for filter buttons (DRY)
  const BUTTON_CLASSES = {
    active: "tag-filter-btn px-2 py-1 text-xs rounded bg-blue-200 text-blue-800 transition-colors flex items-center gap-1",
    inactive: "tag-filter-btn px-2 py-1 text-xs rounded bg-blue-100 text-blue-800 hover:bg-blue-200 transition-colors"
  };

  // Check icon SVG for selected state
  const CHECK_ICON = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>`;

  // Helper: Get selected tag IDs from Tagify (only items of type 'tag')
  function getSelectedTagIds() {
    return tagify.value
      .filter(item => item.value.startsWith('tag|'))
      .map(item => parseInt(item.value.split('|')[1]));
  }

  // Helper: Get all tag IDs for a category
  function getTagIdsInCategory(category) {
    return (tagsByCategory[category] || []).map(t => t.id);
  }

  // Helper: Get category display label
  function getCategoryLabel(category) {
    const btn = [...categoryBtns].find(b => b.dataset.category === category);
    return btn ? btn.textContent.trim() : category;
  }

  // Helper: Remove all tags from a category
  function removeCategoryTagsFromTagify(category) {
    const tagIdsInCategory = getTagIdsInCategory(category);
    tagify.value.forEach(item => {
      if (!item.value.startsWith('tag|')) return;
      const tagId = parseInt(item.value.split('|')[1]);
      if (tagIdsInCategory.includes(tagId)) {
        tagify.removeTags(item.value);
      }
    });
  }

  // Helper: Check if "All" button should be active
  function isAllButtonActive(category) {
    const selectedTagIds = getSelectedTagIds();
    const tagIdsInCategory = getTagIdsInCategory(category);
    const hasSpecificTags = tagIdsInCategory.some(id => selectedTagIds.includes(id));
    return categoryInput.value === category && !hasSpecificTags;
  }

  // Helper: Find which category a tag belongs to
  function findCategoryForTag(tagId) {
    for (const [category, tags] of Object.entries(tagsByCategory)) {
      if (tags.some(tag => tag.id === tagId)) {
        return category;
      }
    }
    return null;
  }

  // Helper: Update category button styling based on active filters
  function updateCategoryButtonStyles() {
    categoryBtns.forEach(btn => {
      const category = btn.dataset.category;
      const isActiveFilter = isCategoryActiveFilter(category);
      const label = btn.dataset.label;

      if (isActiveFilter) {
        // Slightly darker blue + check icon when active
        btn.classList.add('flex', 'items-center', 'gap-1');
        btn.innerHTML = CHECK_ICON + label;
      } else {
        // Default light blue
        btn.classList.remove('flex', 'items-center', 'gap-1');
        btn.textContent = label;
      }
    });
  }

  // Helper: Check if category has active filters
  function isCategoryActiveFilter(category) {
    // Check if "All" is active for this category
    if (categoryInput.value === category) {
      return true;
    }

    // Check if any tags from this category are selected
    const selectedTagIds = getSelectedTagIds();
    const tagIdsInCategory = getTagIdsInCategory(category);
    return tagIdsInCategory.some(id => selectedTagIds.includes(id));
  }

  // Category button click handler
  categoryBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      const category = this.dataset.category;

      if (selectedCategory === category) {
        // Collapse row
        const wasAllSelected = categoryInput.value === category;
        selectedCategory = null;
        tagsRow.classList.remove('expanded');
        // Update height after transition completes
        setTimeout(updateFilterBarHeight, 250);
        // Remove ring from button
        this.classList.remove('ring-1', 'ring-blue-500');
        // Only trigger update if "All" was selected (tags stay in Tagify)
        if (wasAllSelected) {
          categoryInput.value = '';
          updateHiddenInputs();
          triggerFilterUpdate();
        }
      } else {
        // Expand row for this category
        selectedCategory = category;
        // Remove ring from all buttons, then add to current
        categoryBtns.forEach(b => b.classList.remove('ring-1', 'ring-blue-500'));
        this.classList.add('ring-1', 'ring-blue-500');
        expandCategoryRow(category);
      }
    });
  });

  // Expand and render second row for a category
  function expandCategoryRow(category) {
    const tags = tagsByCategory[category] || [];
    const selectedTagIds = getSelectedTagIds();
    const selectedTagsInCategory = tags.filter(tag => selectedTagIds.includes(tag.id)).map(t => t.id);
    const highlightAll = isAllButtonActive(category);

    renderTagButtons(category, tags, highlightAll, selectedTagsInCategory);
    tagsRow.classList.add('expanded');
    // Update height after transition completes
    setTimeout(updateFilterBarHeight, 250);
  }

  // Render "All" + individual tag buttons
  function renderTagButtons(category, tags, highlightAll, selectedTagIds) {
    let html = `
      <button type="button" data-action="category" data-category="${category}"
        class="${highlightAll ? BUTTON_CLASSES.active : BUTTON_CLASSES.inactive}">
        ${highlightAll ? CHECK_ICON : ''}All
      </button>
    `;

    tags.forEach(tag => {
      const isSelected = selectedTagIds.includes(tag.id);
      html += `
        <button type="button" data-action="tag" data-tag-id="${tag.id}" data-tag-name="${escapeHtml(tag.name)}"
          class="${isSelected ? BUTTON_CLASSES.active : BUTTON_CLASSES.inactive}">
          ${isSelected ? CHECK_ICON : ''}${escapeHtml(tag.name)} <span class="opacity-50">(${tag.count})</span>
        </button>
      `;
    });

    tagsRowButtons.innerHTML = html;
    attachTagButtonHandlers();
  }

  // Handle clicks on second row buttons
  function attachTagButtonHandlers() {
    tagsRowButtons.querySelectorAll('.tag-filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const action = this.dataset.action;

        if (action === 'category') {
          handleAllButtonClick(this.dataset.category);
        } else if (action === 'tag') {
          handleTagButtonClick(parseInt(this.dataset.tagId), this.dataset.tagName);
        }
      });
    });
  }

  // Handle "All" button click
  function handleAllButtonClick(category) {
    if (isAllButtonActive(category)) {
      // Toggle off: clear filter
      categoryInput.value = '';
      updateHiddenInputs();
      triggerFilterUpdate();
    } else {
      // Toggle on: remove specific tags, apply category filter
      removeCategoryTagsFromTagify(category);
      categoryInput.value = category;
      updateHiddenInputs();
      triggerFilterUpdate();
    }
  }

  // Handle specific tag button click
  function handleTagButtonClick(tagId, tagName) {
    const selectedTagIds = getSelectedTagIds();

    if (selectedTagIds.includes(tagId)) {
      // Toggle off: remove tag (format: tag|id|name|category)
      const tagToRemove = tagify.value.find(item =>
        item.value.startsWith('tag|') && parseInt(item.value.split('|')[1]) === tagId
      );
      if (tagToRemove) {
        tagify.removeTags(tagToRemove.value);
      }
    } else {
      // Toggle on: add tag, clear category filter
      categoryInput.value = '';
      const categoryLabel = getCategoryLabel(selectedCategory);
      const tagValue = `tag|${tagId}|${tagName}|${categoryLabel}`;
      tagify.addTags([tagValue]);
    }
  }

  // Initialize: Auto-expand second row if category or tag filter is active
  (function initializeCategoryExpansion() {
    const activeCategory = "{{ selected_category }}";

    if (activeCategory) {
      selectedCategory = activeCategory;
      expandCategoryRow(activeCategory);
    } else {
      // Check if selected tags belong to a category
      const selectedTagIds = getSelectedTagIds();
      if (selectedTagIds.length > 0) {
        const category = findCategoryForTag(selectedTagIds[0]);
        if (category) {
          selectedCategory = category;
          expandCategoryRow(category);
        }
      }
    }

    // Update category button styling on page load
    updateCategoryButtonStyles();
  })();

  // HTMX: Disable filter form and show overlay while loading
  const gridWrapper = document.getElementById('album-grid-wrapper');

  document.body.addEventListener('htmx:beforeRequest', function(event) {
    if (event.detail.target.id === 'album-grid-container') {
      form.classList.add('loading');
      gridWrapper.classList.add('loading');
      tagify.DOM.input.setAttribute('contenteditable', 'false');
    }
  });

  // HTMX: Re-initialize after grid swap
  document.body.addEventListener('htmx:afterSwap', function(event) {
    if (event.detail.target.id === 'album-grid-container') {
      form.classList.remove('loading');
      gridWrapper.classList.remove('loading');
      tagify.DOM.input.setAttribute('contenteditable', 'true');
      // Re-initialize Load More button
      initializeLoadMore();

      // Re-render second row to update button states
      if (selectedCategory) {
        expandCategoryRow(selectedCategory);
      }

      // Update category button styling
      updateCategoryButtonStyles();

      // Update clear filters button visibility
      updateClearFiltersVisibility();
    }
  });

  // ====== LOAD MORE PAGINATION ======
  let currentPage = 1;
  let isLoading = false;

  function initializeLoadMore() {
    const loadMoreBtn = document.getElementById('load-more-btn');
    const loadingIndicator = document.getElementById('loading-indicator');

    // Reset state
    currentPage = 1;
    isLoading = false;

    // Ensure loading indicator is hidden (in case of interrupted request)
    if (loadingIndicator) {
      loadingIndicator.classList.add('hidden');
    }

    if (!loadMoreBtn) return;

    // Remove old listeners by cloning the button
    const newBtn = loadMoreBtn.cloneNode(true);
    // Reset any inline styles that might have persisted
    newBtn.style.display = '';
    loadMoreBtn.parentNode.replaceChild(newBtn, loadMoreBtn);

    newBtn.addEventListener('click', async function() {
      if (isLoading) return;

      isLoading = true;

      // Show loading indicator, hide button
      newBtn.style.display = 'none';
      document.getElementById('loading-indicator').classList.remove('hidden');

      currentPage++;
      const url = buildApiUrl(currentPage);

      try {
        const response = await fetch(url);
        const data = await response.json();

        // Append each album to the grid
        const grid = document.querySelector('.grid');
        data.albums.forEach(album => {
          const albumCard = createAlbumCard(album);
          grid.appendChild(albumCard);
        });

        // Hide loading indicator
        document.getElementById('loading-indicator').classList.add('hidden');

        // Show button again if there are more albums, otherwise keep it hidden
        if (data.has_more) {
          newBtn.style.display = 'block';
        }

      } catch (error) {
        console.error('Error loading more albums:', error);
        alert('Error loading more albums. Please try again.');
        document.getElementById('loading-indicator').classList.add('hidden');
        newBtn.style.display = 'block';
      }

      isLoading = false;
    });
  }

  // Initialize on page load
  initializeLoadMore();

  // Build API URL with current filters
  function buildApiUrl(page) {
    const params = new URLSearchParams({ page });

    // Parse unified filter values by type
    tagify.value.forEach(item => {
      const parts = item.value.split('|');
      const type = parts[0];
      const id = parts[1];
      const name = parts[2];

      if (type === 'tag') {
        params.append('tags', id);
      } else if (type === 'artist') {
        params.set('artist', name);
      } else if (type === 'contributor') {
        params.set('contributor', name);
      }
    });

    // Add category filter
    if (categoryInput.value) {
      params.set('category', categoryInput.value);
    }

    return `/api/albums/?${params.toString()}`;
  }

  // Create album card HTML element
  function createAlbumCard(album) {
    const card = document.createElement('div');
    card.className = 'album-card bg-white border rounded overflow-hidden group cursor-pointer hover:border-gray-300 hover:shadow hover:scale-[1.01] transition-all duration-200';
    card.dataset.albumId = album.id;

    // Build cover image HTML
    const coverHtml = album.cover_url
      ? `<img src="${album.cover_url}" alt="${escapeHtml(album.name)}" class="w-full h-full object-cover" loading="lazy">`
      : `<div class="w-full h-full flex items-center justify-center text-gray-400">No cover</div>`;

    // Build tags HTML
    let tagsHtml = '';
    if (album.tags && album.tags.length > 0) {
      const visibleTags = album.tags.slice(0, 4);
      const remainingCount = album.tags.length - 4;

      tagsHtml = `<div class="mt-2 flex flex-wrap gap-1">
        <div class="flex flex-wrap gap-1 group-hover:hidden">
          ${visibleTags.map(tag => `<span class="tag-clickable text-xs px-2 py-1 bg-blue-100 text-blue-800 rounded cursor-pointer hover:bg-blue-200 transition-colors" data-tag-id="${tag.id}" data-tag-name="${escapeHtml(tag.name)}" data-tag-category="${escapeHtml(tag.category)}">${escapeHtml(tag.name)}</span>`).join('')}
          ${remainingCount > 0 ? `<span class="text-xs px-2 py-1 bg-gray-100 text-gray-600 rounded">+${remainingCount}</span>` : ''}
        </div>
        <div class="hidden group-hover:flex flex-wrap gap-1">
          ${album.tags.map(tag => `<span class="tag-clickable text-xs px-2 py-1 bg-blue-100 text-blue-800 rounded cursor-pointer hover:bg-blue-200 transition-colors" data-tag-id="${tag.id}" data-tag-name="${escapeHtml(tag.name)}" data-tag-category="${escapeHtml(tag.category)}">${escapeHtml(tag.name)}</span>`).join('')}
        </div>
      </div>`;
    }

    // Build submitted by HTML
    let submittedByHtml = '';
    if (album.submitted_by) {
      const avatarHtml = album.submitted_by.avatar_url
        ? `<img src="${album.submitted_by.avatar_url}" alt="" class="w-4 h-4 rounded object-cover flex-shrink-0">`
        : `<div class="w-4 h-4 rounded bg-blue-100 text-blue-700 flex items-center justify-center text-xs font-bold flex-shrink-0">${album.submitted_by.username.charAt(0).toUpperCase()}</div>`;
      submittedByHtml = `
        <div class="mt-2 pt-2 border-t border-gray-200 flex items-center gap-1.5">
          ${avatarHtml}
          <span class="contributor-clickable text-xs text-gray-500 truncate cursor-pointer hover:underline"
                data-contributor-id="${album.submitted_by.id}"
                data-contributor-name="${escapeHtml(album.submitted_by.username)}">${escapeHtml(album.submitted_by.username)}</span>
        </div>
      `;
    }

    card.innerHTML = `
      <div class="aspect-square bg-gray-200 relative">
        ${coverHtml}
      </div>
      <div class="p-2">
        <h3 class="font-semibold text-gray-800 truncate">${escapeHtml(album.name)}</h3>
        <p class="artist-clickable text-sm text-gray-600 truncate cursor-pointer hover:underline"
           data-artist-id="${album.artist.id}"
           data-artist-name="${escapeHtml(album.artist.name)}">${escapeHtml(album.artist.name)}</p>
        ${album.year ? `<p class="text-xs text-gray-500">${album.year}</p>` : ''}
        ${tagsHtml}
        ${submittedByHtml}
      </div>
    `;

    return card;
  }

  // Helper: Escape HTML to prevent XSS
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Helper: Get CSRF token for delete form
  function getCsrfToken() {
    const token = document.querySelector('[name=csrfmiddlewaretoken]');
    return token ? token.value : '';
  }

  // ====== ALBUM DRAWER ======
  const drawer = document.getElementById('album-drawer');
  const drawerContent = document.getElementById('drawer-content');
  const mainContent = document.getElementById('main-content');
  let activeAlbumId = null;

  const loadingSpinner = `<div class="flex items-center justify-center h-screen">
    <svg class="animate-spin h-6 w-6 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </div>`;

  function openDrawer(albumId) {
    activeAlbumId = albumId;
    drawer.classList.add('open');
    mainContent.classList.add('drawer-open');
    drawerContent.innerHTML = loadingSpinner;

    // Highlight active card
    document.querySelectorAll('.album-card').forEach(card => {
      card.classList.toggle('active', card.dataset.albumId === String(albumId));
    });

    // Load drawer content via HTMX
    htmx.ajax('GET', `/drawer/${albumId}/`, {target: '#drawer-content', swap: 'innerHTML'});
  }

  function closeDrawer() {
    activeAlbumId = null;
    drawer.classList.remove('open');
    mainContent.classList.remove('drawer-open');

    // Remove highlight from all cards
    document.querySelectorAll('.album-card.active').forEach(card => {
      card.classList.remove('active');
    });
  }

  // Click on album card to open drawer
  document.addEventListener('click', function(e) {
    const card = e.target.closest('.album-card');
    if (!card) return;

    // Don't open drawer if clicking on interactive elements inside the card
    if (e.target.closest('.tag-clickable') ||
        e.target.closest('.artist-clickable') ||
        e.target.closest('.contributor-clickable') ||
        e.target.closest('form') ||
        e.target.closest('button')) {
      return;
    }

    e.preventDefault();
    const albumId = card.dataset.albumId;
    if (albumId) {
      openDrawer(albumId);
    }
  });

  // Close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && activeAlbumId !== null) {
      closeDrawer();
    }
  });

  // Close button inside drawer (delegated)
  document.addEventListener('click', function(e) {
    if (e.target.closest('#drawer-close-btn')) {
      closeDrawer();
    }
  });

  // Close when clicking outside the drawer (but not on album cards, filter, or UI controls)
  document.addEventListener('click', function(e) {
    if (activeAlbumId === null) return;
    if (e.target.closest('#album-drawer')) return;
    if (e.target.closest('.album-card')) return;
    if (e.target.closest('#filter-form')) return;
    if (e.target.closest('#load-more-btn')) return;
    if (e.target.closest('#loading-indicator')) return;
    if (e.target.closest('#toggle-sidebar')) return;
    if (e.target.closest('#sidebar')) return;
    closeDrawer();
  });
</script>
{% endblock %}
