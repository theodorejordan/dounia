{% extends 'base.html' %}

{% block title %}Collection — Dounia{% endblock %}

{% block content %}
<div class="max-w-[82rem] mx-auto">
  <!-- Barre de recherche avec filtres tags -->
  <div class="mb-4 border bg-white p-4 rounded">
    <form method="GET" action="{% url 'collection' %}" id="filter-form">
      <div class="relative mb-3">
        <input
          type="text"
          name="artist"
          id="artist-search"
          placeholder="Search by artist..."
          value="{{ artist_search }}"
          autocomplete="off"
          class="w-full px-3 py-2 pr-10 border border-gray-300 rounded focus:outline-none"
        >
        <button type="button" id="clear-artist" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
        </button>
        <div id="artist-dropdown" class="absolute z-10 w-full bg-white border border-gray-300 rounded mt-1 hidden max-h-60 overflow-y-auto"></div>
      </div>
      <div class="relative mb-3">
        <input id="tags-filter" placeholder="Filter by tags..." class="12 w-full">
        <button type="button" id="clear-tags" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden z-10">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>
      <div id="hidden-tags-inputs"></div>
      <input type="hidden" name="category" id="category-input" value="{{ selected_category }}">

      <!-- Category filter buttons -->
      <div class="flex flex-wrap gap-1">
        {% for category_key, category_label in tag_categories %}
        <button
          type="button"
          data-category="{{ category_key }}"
          data-label="{{ category_label }}"
          class="category-btn px-2 py-1 text-xs rounded transition-colors text-blue-800 hover:bg-blue-200"
        >
          {{ category_label }}
        </button>
        {% endfor %}
      </div>

      <!-- Second row for child tags (initially hidden) -->
      <div id="tags-row" class="mt-3 hidden transition-all">
        <div id="tags-row-buttons" class="flex flex-wrap gap-1"></div>
      </div>
    </form>
  </div>
  
  <!-- Album grid wrapper -->
  <div id="album-grid-wrapper" class="relative">
    <div id="album-grid-container">
      {% include 'albums/_album_grid.html' %}
    </div>
  </div>
</div>

<style>
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Disabled filter form state */
  #filter-form.loading {
    pointer-events: none;
  }

  #filter-form.loading input,
  #filter-form.loading .tagify {
    background-color: #f3f4f6 !important;
    cursor: not-allowed !important;
  }

  #filter-form.loading .tag-filter-btn {
    background-color: #f3f4f6 !important;
    color: #9ca3af !important;
    border-color: #d1d5db !important;
    cursor: not-allowed !important;
  }

  #filter-form.loading .category-btn {
    color: #9ca3af !important;
    border-color: #d1d5db !important;
    --tw-ring-color: #d1d5db !important;
    cursor: not-allowed !important;
  }

  /* Loading state for grid wrapper */
  #album-grid-wrapper.loading #album-grid-container .grid {
    position: relative;
    opacity: 0.5;
  }

  /* Overlay only on the grid, not the count */
  #album-grid-wrapper.loading #album-grid-container .grid::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(195, 195, 195, 0.4);
    z-index: 10;
    border-radius: 6px;
  }

  /* Spinner centered on grid */
  #album-grid-wrapper.loading #album-grid-container .grid::after {
    content: '';
    position: absolute;
    inset: 0;
    margin: auto;
    width: 40px;
    height: 40px;
    border: 3px solid #e5e7eb;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    z-index: 11;
  }

  .tagify {
    display: flex;
    align-items: center;
    min-height: 43.39px;
  }

  .tagify__tag {
    margin: 0.2rem;
    display: inline-flex;
    align-items: center;
  }

  /* Dropdown as inline chips */
  .tagify__dropdown__wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px;
  }

  .tagify__dropdown__item {
    display: inline-block !important;
    width: auto !important;
  }
</style>

<script>
  const IS_STAFF = {{ request.user.is_staff|yesno:"true,false" }};

  // Initialiser Tagify pour le multi-select avec recherche
  const input = document.querySelector('#tags-filter');
  const form = document.getElementById('filter-form');
  const hiddenInputsContainer = document.getElementById('hidden-tags-inputs');
  
  // Préparer la liste de tous les tags disponibles
  const allTagsWhitelist = [
  {% for tag in all_tags %}
  "{{ tag.id }}|{{ tag.name }}|{{ tag.get_category_display }}",
  {% endfor %}
  ];
  
  const tagify = new Tagify(input, {
    enforceWhitelist: true,
    whitelist: allTagsWhitelist,
    dropdown: {
      enabled: 1,
      maxItems: 50,
      closeOnSelect: false,
      highlightFirst: true,
      searchKeys: ['value']
    },
    templates: {
      tag: function(tagData) {
        const parts = tagData.value.split('|');
        const tagId = parts[0];
        const tagName = parts[1];
        const tagCategory = parts[2];
        return `<tag title="${tagName} (${tagCategory})" contenteditable='false' spellcheck='false' class='tagify__tag' data-tag-id="${tagId}">
                    <x title='Remove tag' class='tagify__tag__removeBtn' role='button'></x>
                    <div>
                        <span style='font-size: 0.80rem;'>${tagName}</span>
                    </div>
                </tag>`;
      },
      dropdownItem: function(tagData) {
        const parts = (tagData.value || '').split('|');
        const tagName = parts[1] || tagData.value;
        const tagCategory = parts[2] || '';
        return `<div ${this.getAttributes(tagData)} class='tagify__dropdown__item' tabindex="0" role="option" style='padding: 6px 10px; border-radius: 4px; background: #DBEAFE; color: #1E40AF;'>
                    <span style='font-size: 0.75rem;'>${tagName}</span>
                    <span style='opacity: 0.6; font-size: 0.65rem; margin-left: 4px;'>${tagCategory}</span>
                </div>`;
      }
    },
    transformTag: function(tagData) {
      const parts = tagData.value.split('|');
      tagData.id = parts[0];
      tagData.name = parts[1];
      tagData.category = parts[2];
    }
  });
  
  // Function to update hidden inputs
  function updateHiddenInputs() {
    hiddenInputsContainer.innerHTML = '';
    const tags = tagify.value;
    tags.forEach(tag => {
      const parts = tag.value.split('|');
      const tagId = parts[0];
      const hiddenInput = document.createElement('input');
      hiddenInput.type = 'hidden';
      hiddenInput.name = 'tags';
      hiddenInput.value = tagId;
      hiddenInputsContainer.appendChild(hiddenInput);
    });
  }
  
  // Mettre à jour les inputs cachés quand on ajoute/supprime un tag
  tagify.on('add', updateHiddenInputs);
  tagify.on('remove', updateHiddenInputs);

  // Flag to prevent form submission during initialization
  let isInitializing = true;

  // Submit form when tag is added or removed (after initialization)
  tagify.on('add', function() {
    if (!isInitializing) {
      updateHiddenInputs();
      triggerFilterUpdate();
    }
  });
  tagify.on('remove', function() {
    if (!isInitializing) {
      updateHiddenInputs();
      triggerFilterUpdate();
    }
  });

  // Initialiser avec les tags déjà sélectionnés
  const selectedTags = {{ selected_tags|safe }};
  if (selectedTags.length > 0) {
    const selectedTagsData = [];
    {% for tag in all_tags %}
    {% if tag.id in selected_tags %}
    selectedTagsData.push("{{ tag.id }}|{{ tag.name }}|{{ tag.get_category_display }}");
    {% endif %}
    {% endfor %}
    tagify.addTags(selectedTagsData);
    updateHiddenInputs();
  }

  // Initialization complete, enable auto-submit
  isInitializing = false;

  // ====== CLICKABLE TAGS IN GRID ======
  // Use event delegation to handle clicks on tags (both initial and dynamically loaded)
  document.addEventListener('click', function(e) {
    const tagElement = e.target.closest('.tag-clickable');
    if (!tagElement) return;

    e.preventDefault();
    e.stopPropagation();

    const tagId = tagElement.dataset.tagId;
    const tagName = tagElement.dataset.tagName;
    const tagCategory = tagElement.dataset.tagCategory;

    // Format: "id|name|category" (same as Tagify whitelist)
    const tagValue = `${tagId}|${tagName}|${tagCategory}`;

    // Check if tag is already in Tagify
    const existingTags = tagify.value;
    const isAlreadyAdded = existingTags.some(tag => tag.value === tagValue);

    if (!isAlreadyAdded) {
      tagify.addTags([tagValue]);
      // Form submission happens automatically via Tagify's 'add' event listener
    }
  });

  // Autocomplete pour la recherche d'artistes
  const artistInput = document.getElementById('artist-search');
  const artistDropdown = document.getElementById('artist-dropdown');
  let debounceTimer;
  let selectedIndex = -1;

  artistInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    const query = this.value.trim();

    debounceTimer = setTimeout(() => {
      if (query.length >= 1) {
        fetchArtists(query);
      } else {
        hideDropdown();
      }
    }, 200);
  });

  function fetchArtists(query) {
    fetch(`{% url 'artists_autocomplete' %}?q=${encodeURIComponent(query)}`)
      .then(response => response.json())
      .then(artists => {
        if (artists.length > 0) {
          renderDropdown(artists);
        } else {
          hideDropdown();
        }
      });
  }

  function renderDropdown(artists) {
    selectedIndex = -1;
    artistDropdown.innerHTML = artists.map((artist, index) => `
      <div class="artist-option px-3 py-2 cursor-pointer hover:bg-blue-50 flex items-center" data-index="${index}" data-name="${artist.name}">
        <span class="font-medium text-gray-800">${artist.name}</span>
        <span class="text-xs text-gray-500 ml-2">(${artist.album_count} album${artist.album_count > 1 ? 's' : ''})</span>
      </div>
    `).join('');
    artistDropdown.classList.remove('hidden');

    // Add click handlers
    artistDropdown.querySelectorAll('.artist-option').forEach(option => {
      option.addEventListener('click', function() {
        artistInput.value = this.dataset.name;
        hideDropdown();
        updateHiddenInputs();
        triggerFilterUpdate();
      });
    });
  }

  function hideDropdown() {
    artistDropdown.classList.add('hidden');
    selectedIndex = -1;
  }

  // Keyboard navigation
  artistInput.addEventListener('keydown', function(e) {
    const options = artistDropdown.querySelectorAll('.artist-option');
    if (options.length === 0 || artistDropdown.classList.contains('hidden')) return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedIndex = Math.min(selectedIndex + 1, options.length - 1);
      updateSelection(options);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedIndex = Math.max(selectedIndex - 1, 0);
      updateSelection(options);
    } else if (e.key === 'Enter' && selectedIndex >= 0) {
      e.preventDefault();
      artistInput.value = options[selectedIndex].dataset.name;
      hideDropdown();
      updateHiddenInputs();
      triggerFilterUpdate();
    } else if (e.key === 'Escape') {
      hideDropdown();
    }
  });

  function updateSelection(options) {
    options.forEach((opt, i) => {
      if (i === selectedIndex) {
        opt.classList.add('bg-blue-100');
        opt.scrollIntoView({ block: 'nearest' });
      } else {
        opt.classList.remove('bg-blue-100');
      }
    });
  }

  // Hide dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!artistInput.contains(e.target) && !artistDropdown.contains(e.target)) {
      hideDropdown();
    }
  });

  // Clear buttons functionality
  const clearArtistBtn = document.getElementById('clear-artist');
  const clearTagsBtn = document.getElementById('clear-tags');

  // Show/hide clear artist button based on input value
  function updateClearArtistVisibility() {
    if (artistInput.value.trim().length > 0) {
      clearArtistBtn.classList.remove('hidden');
    } else {
      clearArtistBtn.classList.add('hidden');
    }
  }

  // Show/hide clear tags button based on tagify value
  function updateClearTagsVisibility() {
    if (tagify.value.length > 0) {
      clearTagsBtn.classList.remove('hidden');
    } else {
      clearTagsBtn.classList.add('hidden');
    }
  }

  // Initialize visibility on page load
  updateClearArtistVisibility();
  updateClearTagsVisibility();

  // Update visibility on input change
  artistInput.addEventListener('input', updateClearArtistVisibility);
  tagify.on('add', updateClearTagsVisibility);
  tagify.on('remove', updateClearTagsVisibility);

  // Clear artist input and submit
  clearArtistBtn.addEventListener('click', function() {
    artistInput.value = '';
    updateHiddenInputs();
    triggerFilterUpdate();
  });

  // Clear tags and submit
  clearTagsBtn.addEventListener('click', function() {
    tagify.removeAllTags();
    updateHiddenInputs();
    triggerFilterUpdate();
  });

  // ====== CATEGORY FILTER WITH EXPANDABLE TAG ROW ======
  const categoryInput = document.getElementById('category-input');
  const categoryBtns = document.querySelectorAll('.category-btn');
  const tagsRow = document.getElementById('tags-row');
  const tagsRowButtons = document.getElementById('tags-row-buttons');
  let selectedCategory = null;

  // Helper: Trigger HTMX request with current filters
  function triggerFilterUpdate() {
    const params = new URLSearchParams();

    // Add artist filter
    const artistValue = document.getElementById('artist-search').value.trim();
    if (artistValue) {
      params.set('artist', artistValue);
    }

    // Add category filter
    if (categoryInput.value) {
      params.set('category', categoryInput.value);
    }

    // Add tag filters
    const tagValues = tagify.value;
    tagValues.forEach(tag => {
      const tagId = tag.value.split('|')[0];
      params.append('tags', tagId);
    });

    // Update browser URL to match current filters
    const newUrl = params.toString()
      ? `${window.location.pathname}?${params.toString()}`
      : window.location.pathname;
    history.replaceState(null, '', newUrl);

    // Make HTMX request
    const url = `/partials/album-grid/?${params.toString()}`;
    htmx.ajax('GET', url, {target: '#album-grid-container', swap: 'innerHTML'});
  }

  // Preload and organize all tags by category (instant access, no API call needed)
  const tagsByCategory = {};
  {% for tag in all_tags %}
  const category_{{ forloop.counter }} = "{{ tag.category }}";
  if (!tagsByCategory[category_{{ forloop.counter }}]) {
    tagsByCategory[category_{{ forloop.counter }}] = [];
  }
  tagsByCategory[category_{{ forloop.counter }}].push({
    id: {{ tag.id }},
    name: "{{ tag.name }}"
  });
  {% endfor %}

  // CSS classes for filter buttons (DRY)
  const BUTTON_CLASSES = {
    active: "tag-filter-btn px-2 py-1 text-xs rounded bg-blue-200 text-blue-800 transition-colors flex items-center gap-1",
    inactive: "tag-filter-btn px-2 py-1 text-xs rounded bg-blue-100 text-blue-800 hover:bg-blue-200 transition-colors"
  };

  // Check icon SVG for selected state
  const CHECK_ICON = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>`;

  // Helper: Get selected tag IDs from Tagify
  function getSelectedTagIds() {
    return tagify.value.map(tag => parseInt(tag.value.split('|')[0]));
  }

  // Helper: Get all tag IDs for a category
  function getTagIdsInCategory(category) {
    return (tagsByCategory[category] || []).map(t => t.id);
  }

  // Helper: Get category display label
  function getCategoryLabel(category) {
    const btn = [...categoryBtns].find(b => b.dataset.category === category);
    return btn ? btn.textContent.trim() : category;
  }

  // Helper: Remove all tags from a category
  function removeCategoryTagsFromTagify(category) {
    const tagIdsInCategory = getTagIdsInCategory(category);
    tagify.value.forEach(tag => {
      const tagId = parseInt(tag.value.split('|')[0]);
      if (tagIdsInCategory.includes(tagId)) {
        tagify.removeTags(tag.value);
      }
    });
  }

  // Helper: Check if "All" button should be active
  function isAllButtonActive(category) {
    const selectedTagIds = getSelectedTagIds();
    const tagIdsInCategory = getTagIdsInCategory(category);
    const hasSpecificTags = tagIdsInCategory.some(id => selectedTagIds.includes(id));
    return categoryInput.value === category && !hasSpecificTags;
  }

  // Helper: Find which category a tag belongs to
  function findCategoryForTag(tagId) {
    for (const [category, tags] of Object.entries(tagsByCategory)) {
      if (tags.some(tag => tag.id === tagId)) {
        return category;
      }
    }
    return null;
  }

  // Helper: Update category button styling based on active filters
  function updateCategoryButtonStyles() {
    categoryBtns.forEach(btn => {
      const category = btn.dataset.category;
      const isActiveFilter = isCategoryActiveFilter(category);
      const label = btn.dataset.label;

      if (isActiveFilter) {
        // Slightly darker blue + check icon when active
        btn.classList.add('flex', 'items-center', 'gap-1');
        btn.innerHTML = CHECK_ICON + label;
      } else {
        // Default light blue
        btn.classList.remove('flex', 'items-center', 'gap-1');
        btn.textContent = label;
      }
    });
  }

  // Helper: Check if category has active filters
  function isCategoryActiveFilter(category) {
    // Check if "All" is active for this category
    if (categoryInput.value === category) {
      return true;
    }

    // Check if any tags from this category are selected
    const selectedTagIds = getSelectedTagIds();
    const tagIdsInCategory = getTagIdsInCategory(category);
    return tagIdsInCategory.some(id => selectedTagIds.includes(id));
  }

  // Category button click handler
  categoryBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      const category = this.dataset.category;

      if (selectedCategory === category) {
        // Collapse row
        const wasAllSelected = categoryInput.value === category;
        selectedCategory = null;
        tagsRow.classList.add('hidden');
        // Remove ring from button
        this.classList.remove('ring-1', 'ring-blue-500');
        // Only trigger update if "All" was selected (tags stay in Tagify)
        if (wasAllSelected) {
          categoryInput.value = '';
          updateHiddenInputs();
          triggerFilterUpdate();
        }
      } else {
        // Expand row for this category
        selectedCategory = category;
        // Remove ring from all buttons, then add to current
        categoryBtns.forEach(b => b.classList.remove('ring-1', 'ring-blue-500'));
        this.classList.add('ring-1', 'ring-blue-500');
        expandCategoryRow(category);
      }
    });
  });

  // Expand and render second row for a category
  function expandCategoryRow(category) {
    const tags = tagsByCategory[category] || [];
    const selectedTagIds = getSelectedTagIds();
    const selectedTagsInCategory = tags.filter(tag => selectedTagIds.includes(tag.id)).map(t => t.id);
    const highlightAll = isAllButtonActive(category);

    renderTagButtons(category, tags, highlightAll, selectedTagsInCategory);
    tagsRow.classList.remove('hidden');
  }

  // Render "All" + individual tag buttons
  function renderTagButtons(category, tags, highlightAll, selectedTagIds) {
    let html = `
      <button type="button" data-action="category" data-category="${category}"
        class="${highlightAll ? BUTTON_CLASSES.active : BUTTON_CLASSES.inactive}">
        ${highlightAll ? CHECK_ICON : ''}All
      </button>
    `;

    tags.forEach(tag => {
      const isSelected = selectedTagIds.includes(tag.id);
      html += `
        <button type="button" data-action="tag" data-tag-id="${tag.id}" data-tag-name="${escapeHtml(tag.name)}"
          class="${isSelected ? BUTTON_CLASSES.active : BUTTON_CLASSES.inactive}">
          ${isSelected ? CHECK_ICON : ''}${escapeHtml(tag.name)}
        </button>
      `;
    });

    tagsRowButtons.innerHTML = html;
    attachTagButtonHandlers();
  }

  // Handle clicks on second row buttons
  function attachTagButtonHandlers() {
    tagsRowButtons.querySelectorAll('.tag-filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const action = this.dataset.action;

        if (action === 'category') {
          handleAllButtonClick(this.dataset.category);
        } else if (action === 'tag') {
          handleTagButtonClick(parseInt(this.dataset.tagId), this.dataset.tagName);
        }
      });
    });
  }

  // Handle "All" button click
  function handleAllButtonClick(category) {
    if (isAllButtonActive(category)) {
      // Toggle off: clear filter
      categoryInput.value = '';
      updateHiddenInputs();
      triggerFilterUpdate();
    } else {
      // Toggle on: remove specific tags, apply category filter
      removeCategoryTagsFromTagify(category);
      categoryInput.value = category;
      updateHiddenInputs();
      triggerFilterUpdate();
    }
  }

  // Handle specific tag button click
  function handleTagButtonClick(tagId, tagName) {
    const selectedTagIds = getSelectedTagIds();

    if (selectedTagIds.includes(tagId)) {
      // Toggle off: remove tag
      const tagToRemove = tagify.value.find(tag => parseInt(tag.value.split('|')[0]) === tagId);
      if (tagToRemove) {
        tagify.removeTags(tagToRemove.value);
      }
    } else {
      // Toggle on: add tag, clear category filter
      categoryInput.value = '';
      const categoryLabel = getCategoryLabel(selectedCategory);
      const tagValue = `${tagId}|${tagName}|${categoryLabel}`;
      tagify.addTags([tagValue]);
    }
  }

  // Initialize: Auto-expand second row if category or tag filter is active
  (function initializeCategoryExpansion() {
    const activeCategory = "{{ selected_category }}";

    if (activeCategory) {
      selectedCategory = activeCategory;
      expandCategoryRow(activeCategory);
    } else {
      // Check if selected tags belong to a category
      const selectedTagIds = getSelectedTagIds();
      if (selectedTagIds.length > 0) {
        const category = findCategoryForTag(selectedTagIds[0]);
        if (category) {
          selectedCategory = category;
          expandCategoryRow(category);
        }
      }
    }

    // Update category button styling on page load
    updateCategoryButtonStyles();
  })();

  // HTMX: Disable filter form and show overlay while loading
  const gridWrapper = document.getElementById('album-grid-wrapper');

  document.body.addEventListener('htmx:beforeRequest', function(event) {
    if (event.detail.target.id === 'album-grid-container') {
      form.classList.add('loading');
      gridWrapper.classList.add('loading');
      artistInput.readOnly = true;
      tagify.DOM.input.setAttribute('contenteditable', 'false');
    }
  });

  // HTMX: Re-initialize after grid swap
  document.body.addEventListener('htmx:afterSwap', function(event) {
    if (event.detail.target.id === 'album-grid-container') {
      form.classList.remove('loading');
      gridWrapper.classList.remove('loading');
      artistInput.readOnly = false;
      tagify.DOM.input.setAttribute('contenteditable', 'true');
      // Re-initialize Load More button
      initializeLoadMore();

      // Re-render second row to update button states
      if (selectedCategory) {
        expandCategoryRow(selectedCategory);
      }

      // Update category button styling
      updateCategoryButtonStyles();
    }
  });

  // ====== LOAD MORE PAGINATION ======
  let currentPage = 1;
  let isLoading = false;

  function initializeLoadMore() {
    const loadMoreBtn = document.getElementById('load-more-btn');
    if (!loadMoreBtn) return;

    // Reset state
    currentPage = 1;
    isLoading = false;

    // Remove old listeners by cloning the button
    const newBtn = loadMoreBtn.cloneNode(true);
    loadMoreBtn.parentNode.replaceChild(newBtn, loadMoreBtn);

    newBtn.addEventListener('click', async function() {
      if (isLoading) return;

      isLoading = true;

      // Show loading indicator, hide button
      newBtn.style.display = 'none';
      document.getElementById('loading-indicator').classList.remove('hidden');

      currentPage++;
      const url = buildApiUrl(currentPage);

      try {
        const response = await fetch(url);
        const data = await response.json();

        // Append each album to the grid
        const grid = document.querySelector('.grid');
        data.albums.forEach(album => {
          const albumCard = createAlbumCard(album);
          grid.appendChild(albumCard);
        });

        // Hide loading indicator
        document.getElementById('loading-indicator').classList.add('hidden');

        // Show button again if there are more albums, otherwise keep it hidden
        if (data.has_more) {
          newBtn.style.display = 'block';
        }

      } catch (error) {
        console.error('Error loading more albums:', error);
        alert('Error loading more albums. Please try again.');
        document.getElementById('loading-indicator').classList.add('hidden');
        newBtn.style.display = 'block';
      }

      isLoading = false;
    });
  }

  // Initialize on page load
  initializeLoadMore();

  // Build API URL with current filters
  function buildApiUrl(page) {
    const params = new URLSearchParams({ page });

    // Add artist filter
    const artistValue = artistInput.value.trim();
    if (artistValue) {
      params.set('artist', artistValue);
    }

    // Add selected tags
    const tagValues = tagify.value;
    tagValues.forEach(tag => {
      const tagId = tag.value.split('|')[0];
      params.append('tags', tagId);
    });

    // Add category filter
    if (categoryInput.value) {
      params.set('category', categoryInput.value);
    }

    return `/api/albums/?${params.toString()}`;
  }

  // Create album card HTML element
  function createAlbumCard(album) {
    const card = document.createElement('div');
    card.className = 'bg-white border rounded overflow-hidden group';

    // Build cover image HTML
    const coverHtml = album.cover_url
      ? `<img src="${album.cover_url}" alt="${escapeHtml(album.name)}" class="w-full h-full object-cover" loading="lazy">`
      : `<div class="w-full h-full flex items-center justify-center text-gray-400">No cover</div>`;

    // Build tags HTML
    let tagsHtml = '';
    if (album.tags && album.tags.length > 0) {
      const visibleTags = album.tags.slice(0, 4);
      const remainingCount = album.tags.length - 4;

      tagsHtml = `<div class="mt-2 flex flex-wrap gap-1">
        <div class="flex flex-wrap gap-1 group-hover:hidden">
          ${visibleTags.map(tag => `<span class="tag-clickable text-xs px-2 py-1 bg-blue-100 text-blue-800 rounded cursor-pointer hover:bg-blue-200 transition-colors" data-tag-id="${tag.id}" data-tag-name="${escapeHtml(tag.name)}" data-tag-category="${escapeHtml(tag.category)}">${escapeHtml(tag.name)}</span>`).join('')}
          ${remainingCount > 0 ? `<span class="text-xs px-2 py-1 bg-gray-100 text-gray-600 rounded">+${remainingCount}</span>` : ''}
        </div>
        <div class="hidden group-hover:flex flex-wrap gap-1">
          ${album.tags.map(tag => `<span class="tag-clickable text-xs px-2 py-1 bg-blue-100 text-blue-800 rounded cursor-pointer hover:bg-blue-200 transition-colors" data-tag-id="${tag.id}" data-tag-name="${escapeHtml(tag.name)}" data-tag-category="${escapeHtml(tag.category)}">${escapeHtml(tag.name)}</span>`).join('')}
        </div>
      </div>`;
    }

    card.innerHTML = `
      <div class="aspect-square bg-gray-200 relative">
        ${coverHtml}
        ${IS_STAFF ? `
        <form method="POST" action="/delete/${album.id}/" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity" onsubmit="return confirm('Are you sure you want to delete this album?');">
          <input type="hidden" name="csrfmiddlewaretoken" value="${getCsrfToken()}">
          <button type="submit" class="bg-gray-100 hover:bg-gray-300 opacity-60 hover:opacity-80 text-gray-400 hover:text-gray-800 p-2 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
          </button>
        </form>` : ''}
      </div>
      <div class="p-2">
        <h3 class="font-semibold text-gray-800 truncate">${escapeHtml(album.name)}</h3>
        <p class="text-sm text-gray-600 truncate">${escapeHtml(album.artist.name)}</p>
        ${album.year ? `<p class="text-xs text-gray-500">${album.year}</p>` : ''}
        ${tagsHtml}
      </div>
    `;

    return card;
  }

  // Helper: Escape HTML to prevent XSS
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Helper: Get CSRF token for delete form
  function getCsrfToken() {
    const token = document.querySelector('[name=csrfmiddlewaretoken]');
    return token ? token.value : '';
  }
</script>
{% endblock %}
